<!DOCTYPE html>
<html>
<head>

    <style>

        }
        .status {
            background: #4CAF50;
            color: white;
            padding: 20px;
            border-radius: 10px;
            margin: 20px;
        }
        .btn {
            display: inline-block;
            padding: 15px 30px;

<body>
    <h1>🎮 H5游戏测试 - 简化版</h1>
    
    <div class="status">
        <h2>✅ 服务器状态正常</h2>

    </div>
    
    <h3>测试链接：</h3>
